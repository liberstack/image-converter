<!doctype html>
<html lang="pt-BR">

<head>
     <meta charset="utf-8" />
     <meta name="viewport" content="width=device-width,initial-scale=1" />
     <title>jpg-press</title>
     <link rel="icon" type="image/png" href="./cube_icon.png" />
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap"
          rel="stylesheet">
     <link rel="stylesheet" href="./style.css" />
</head>

<body>

     <header class="app-header">
          <div>
               <h1>jpg-press</h1>
               <p>PNG · WebP · qualquer imagem → JPG comprimido — processamento local, zero upload</p>
          </div>
          <span class="badge">client-side only</span>
     </header>

     <main>

          <div class="upload-row">
               <label class="upload-btn">
                    <input id="file" type="file" accept="image/*" multiple>
                    + Selecionar
               </label>
               <div id="drop" class="drop-zone" tabindex="0">
                    Arraste imagens aqui
               </div>
          </div>

          <div class="controls">
               <div class="spacer"></div>
               <button id="convert" class="action-btn convert-btn">Prensar Todas</button>
               <button id="downloadAll" class="action-btn download-all-btn">Baixar Todas</button>
          </div>

          <div class="thumbs" id="thumbs"></div>

     </main>

     <footer class="app-footer">
          <span>Compressão via <code>&lt;canvas&gt;</code> + <code>toBlob('image/jpeg')</code></span>
          <a href="https://github.com/devgbr86" target="_blank" rel="noopener">@devgbr86</a>
     </footer>

     <script src="./js/utils.js"></script>
     <script src="./js/store.js"></script>
     <script src="./js/imageService.js"></script>
     <script src="./js/ui.js"></script>
     <script src="./js/main.js"></script>
</body>

</html>
